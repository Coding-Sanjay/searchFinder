<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90D9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6C5CE7;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="20" cy="20" r="19" fill="url(#bgGrad)" stroke="#3A7BC8" stroke-width="1"/>
  <!-- Magnifying glass body -->
  <circle cx="17" cy="16" r="8" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Magnifying glass handle -->
  <line x1="23" y1="22" x2="30" y2="29" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Key symbol inside lens -->
  <text x="17" y="19" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="white">K</text>
</svg>
